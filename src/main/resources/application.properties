spring.application.name=order_furniture_billboards
spring.datasource.url=jdbc:postgresql://localhost:5432/orders
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
server.port=8081


spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ???? ? ???????? changelog-?????
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# ???????? Liquibase (?? ????????? true ? Spring Boot)
spring.liquibase.enabled=false
# ?? ?????????? ?? ??? ??????
spring.liquibase.drop-first=false

liquibase.searchPath=src/main/resources

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5674
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.queue.name=review-queue

spring.rabbitmq.template.message-converter=jackson2JsonMessageConverter
spring.rabbitmq.listener.simple.message-converter=jackson2JsonMessageConverter
