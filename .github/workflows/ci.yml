# .github/workflows/ci.yml
name: CI – Spring Boot + Maven

on:
  push:
    branches: [ master, feature/example ]
  pull_request:
    branches: [ master ]

jobs:
  # ────────────────────────────────────────────────────────
  # 1️⃣ BUILD
  # ────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and run unit tests
        run: mvn -B clean verify --file pom.xml

      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.war

  # ────────────────────────────────────────────────────────
  # 2️⃣ TEST (unit tests are already run in build, but we keep it for clarity)
  # ────────────────────────────────────────────────────────
  test:
    needs: build          # <-- запускается только после успешного build
    runs-on: ubuntu-latest
    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app

      - name: Run additional unit checks (if any)
        run: |
          echo "Running extra checks..."
          # например, static analysis, code‑coverage, etc.