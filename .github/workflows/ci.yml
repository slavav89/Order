# .github/workflows/ci.yml
name: CI – Spring Boot + Maven

on:
  push:
    branches: [ master, feature/example ]   # Триггер push
  pull_request:
    branches: [ master ]                   # Триггер PR в master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Устанавливаем JDK 17 (или ту, что в pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Кешируем Maven‑зависимости (ускоряет сборку)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4️⃣ Собираем проект и запускаем unit‑тесты
      - name: Build and run unit tests
        run: mvn -B clean verify --file pom.xml

      # 5️⃣ (Опционально) Сохраняем WAR как артефакт
      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.war